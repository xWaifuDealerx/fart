<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FartPerps — moved</title>
<!-- Permanent move: /perpetuals → /fartperps. Kept around so anyone
     with a bookmark or external link to perpetuals.html still lands
     on the new page instead of a 404. -->
<meta http-equiv="refresh" content="0; url=fartperps.html">
<link rel="canonical" href="fartperps.html">
<meta name="robots" content="noindex">
<style>
  body {
    background: #050d09;
    color: #e6ffee;
    font-family: 'JetBrains Mono', 'SF Mono', monospace;
    display: grid; place-items: center;
    min-height: 100vh;
    text-align: center;
  }
  a { color: #5ff09c; text-decoration: none; }
  a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div>
  <p style="opacity:0.6;font-size:12px;letter-spacing:2px;text-transform:uppercase;">App renamed</p>
  <p style="margin-top:14px;font-size:18px;">Perpetuals is now <b>FartPerps</b>.</p>
  <p style="margin-top:14px;">Redirecting you to <a href="fartperps.html">fartperps.html</a>…</p>
</div>
<script>
  // JS belt to the meta-refresh suspenders so the redirect happens instantly
  // on browsers that don't honor meta http-equiv as quickly.
  setTimeout(function(){ location.replace("fartperps.html"); }, 80);
</script>
</body>
</html>
