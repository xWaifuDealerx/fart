<style>
  :root {
    --bg: #0a0f1c;
    --bg-2: #0e1526;
    --card: #131c30;
    --text: #eaf1ff;
    --text-2: #aebbd4;
    --border: #233252;
    --green: #16a34a;
    --green-bright: #2ee06b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex;
    flex-direction: column;
    background:
      radial-gradient(900px 500px at 50% -10%, rgba(46,224,107,0.12), transparent 60%),
      var(--bg);
  }
  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 14px;
    padding: 16px 22px;
    border-bottom: 1px solid var(--border);
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand .hub {
    width: 42px; height: 42px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #0e1b14 0%, #16a34a 100%);
    box-shadow: 0 4px 14px rgba(22,163,74,0.30);
  }
  .brand .hub svg { width: 24px; height: 24px; }
  .brand-name { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 22px; text-transform: uppercase; letter-spacing: -0.3px; }
  .brand-name .accent {
    background: linear-gradient(135deg, var(--green) 0%, var(--green-bright) 100%);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  }
  .nav-actions { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .pill {
    color: var(--text-2); background: var(--card); border: 1px solid var(--border);
    padding: 8px 16px; border-radius: 100px; font-size: 13px; font-weight: 600;
    text-decoration: none; transition: all 0.15s;
  }
  .pill:hover { border-color: var(--green-bright); color: var(--green-bright); }
  .pill.solid { background: linear-gradient(135deg, var(--green), var(--green-bright)); color: #06281a; border: 0; font-weight: 700; }
  .chart-wrap { flex: 1; position: relative; min-height: 0; padding: 14px; }
  .chart-wrap iframe { width: 100%; height: 100%; border: 0; border-radius: 16px; background: var(--card); display: block; }
  @media (max-width: 600px) { .chart-wrap { padding: 8px; } .nav { padding: 12px 16px; } }
</style>

      src="https://dexscreener.com/solana/cptjblrg4zxwstvnmrjv3bfgufcyt94x7rcimccgdryo?embed=1&loadChartSettings=0&trades=0&tabs=0&info=0&chartLeftToolbar=0&chartDefaultOnMobile=1&chartTheme=dark&theme=dark&chartStyle=1&chartType=usd&interval=15"
      title="$FARTPRINT live chart"
